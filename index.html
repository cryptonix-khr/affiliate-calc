<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cryptonix Annual Partner Calculator</title>
    <style>
        :root {
            --primary: #0052FF;
            --bg: #f4f7f9;
            --text: #333;
            --white: #ffffff;
        }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: var(--text); line-height: 1.5; }
        .calc-container { max-width: 500px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        
        .model-toggle { display: flex; background: #eee; border-radius: 8px; padding: 4px; margin-bottom: 25px; }
        .model-toggle button { flex: 1; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .model-toggle button.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .info-icon { display: inline-block; width: 16px; height: 16px; background: #ccc; color: white; border-radius: 50%; text-align: center; line-height: 16px; font-size: 11px; cursor: help; margin-left: 5px; }
        .tooltip-box { visibility: hidden; width: 240px; background-color: #333; color: #fff; border-radius: 6px; padding: 10px; position: absolute; z-index: 10; bottom: 125%; left: 50%; margin-left: -120px; opacity: 0; transition: opacity 0.3s; font-weight: normal; font-size: 0.8rem; }
        .input-group:hover .tooltip-box { visibility: visible; opacity: 1; }

        .results { background: #eef3ff; padding: 20px; border-radius: 8px; margin-top: 25px; border: 1px solid #d0deff; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .total { font-weight: bold; font-size: 1.3rem; color: var(--primary); border-top: 2px solid #bcd0ff; padding-top: 12px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="calc-container">
    <h2 style="color: var(--primary); margin-top: 0;">Annual Revenue Forecast</h2>
    
    <div class="model-toggle">
        <button id="btnAgent" class="active" onclick="setModel('agent')">Agent Model</button>
        <button id="btnMarkup" onclick="setModel('markup')">Markup Model</button>
    </div>

    <div class="input-group">
        <label>Avg. Monthly Merchant Volume ($) <span class="info-icon">?</span>
            <span class="tooltip-box">The average monthly transaction value. Calculated annually.</span>
        </label>
        <input type="number" id="volume" value="100000" oninput="calculate()">
    </div>

    <div class="input-group" id="yieldGroup">
        <label>Cryptonix Effective Yield (%) <span class="info-icon">?</span>
            <span class="tooltip-box">Cryptonix's processing margin. Typical blended yield is 1.1%.</span>
        </label>
        <input type="number" id="yield" value="1.1" step="0.1" oninput="calculate()">
    </div>

    <div class="input-group" id="markupGroup" class="hidden">
        <label>Your Custom Markup (%) <span class="info-icon">?</span>
            <span class="tooltip-box">The additional premium you set. You keep 100% of this income.</span>
        </label>
        <input type="number" id="markup" value="0.1" step="0.01" oninput="calculate()">
    </div>

    <div class="results">
        <div id="agentResultDetails">
            <div class="result-line">
                <span>Est. Annual CP Profit:</span>
                <span id="annualCPProfit">$0.00</span>
            </div>
            <div class="result-line">
                <span>Your Commission Rate (<span id="sharePercent">0</span>%):</span>
                <span id="baseEarnings">$0.00</span>
            </div>
        </div>
        
        <div id="markupResultDetails" class="hidden">
            <div class="result-line">
                <span>Annual Processed Volume:</span>
                <span id="annualVolume">$0.00</span>
            </div>
            <div class="result-line">
                <span>Your Markup Share (100%):</span>
                <span id="markupEarnings">$0.00</span>
            </div>
        </div>

        <div class="result-line total">
            <span>Total Yearly Earnings:</span>
            <span id="totalCommission">$0.00</span>
        </div>
    </div>
</div>

<script>
    let currentModel = 'agent';

    function setModel(model) {
        currentModel = model;
        document.getElementById('btnAgent').classList.toggle('active', model === 'agent');
        document.getElementById('btnMarkup').classList.toggle('active', model === 'markup');
        
        // Input Visibility
        document.getElementById('yieldGroup').style.display = (model === 'agent') ? 'block' : 'none';
        document.getElementById('markupGroup').style.display = (model === 'markup') ? 'block' : 'none';
        
        // Result Visibility
        document.getElementById('agentResultDetails').classList.toggle('hidden', model === 'markup');
        document.getElementById('markupResultDetails').classList.toggle('hidden', model === 'agent');
        
        calculate();
    }

    function calculate() {
        const monthlyVol = parseFloat(document.getElementById('volume').value) || 0;
        const annualVol = monthlyVol * 12;
        const yld = (parseFloat(document.getElementById('yield').value) || 0) / 100;
        const mrk = (parseFloat(document.getElementById('markup').value) || 0) / 100;

        let totalYearly = 0;

        if (currentModel === 'agent') {
            const annualCPProfit = annualVol * yld;
            
            // Yearly Tiers: $12k (10%), $30k (15%), $60k (20%)
            let shareRate = 0.05;
            if (annualCPProfit >= 60000) shareRate = 0.20;
            else if (annualCPProfit >= 30000) shareRate = 0.15;
            else if (annualCPProfit >= 12000) shareRate = 0.10;

            totalYearly = annualCPProfit * shareRate;

            document.getElementById('annualCPProfit').innerText = formatCurrency(annualCPProfit);
            document.getElementById('sharePercent').innerText = (shareRate * 100);
            document.getElementById('baseEarnings').innerText = formatCurrency(totalYearly);
        } else {
            totalYearly = annualVol * mrk;
            document.getElementById('annualVolume').innerText = formatCurrency(annualVol);
            document.getElementById('markupEarnings').innerText = formatCurrency(totalYearly);
        }

        document.getElementById('totalCommission').innerText = formatCurrency(totalYearly);
    }

    function formatCurrency(num) {
        return '$' + num.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Initial State
    setModel('agent');
</script>

</body>
</html>

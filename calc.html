<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cryptonix Affiliate Calculator</title>
    <style>
        :root {
            --primary: #0052FF;
            --bg: #f4f7f9;
            --text: #333;
            --white: #ffffff;
        }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .calc-container { max-width: 450px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        /* Tooltip Styling */
        .info-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: #ccc;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 16px;
            font-size: 12px;
            cursor: help;
            margin-left: 5px;
        }
        .tooltip-box {
            visibility: hidden;
            width: 220px;
            background-color: #333;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%; 
            left: 50%;
            margin-left: -110px;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: normal;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .input-group:hover .tooltip-box { visibility: visible; opacity: 1; }

        .results { background: #eef3ff; padding: 20px; border-radius: 8px; margin-top: 25px; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .total { font-weight: bold; font-size: 1.2rem; color: var(--primary); border-top: 1px solid #bcd0ff; pt: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="calc-container">
    <h2>Revenue Forecast</h2>
    
    <div class="input-group">
        <label>Total Monthly Volume ($) <span class="info-icon">?</span>
            <span class="tooltip-box">The total value of merchant operations processed through our gateway.</span>
        </label>
        <input type="number" id="volume" value="100000" step="1000">
    </div>

    <div class="input-group">
        <label>Effective Yield (%) <span class="info-icon">?</span>
            <span class="tooltip-box">While margins vary, our partners typically see a Blended Yield of 1.1%.</span>
        </label>
        <input type="number" id="yield" value="1.1" step="0.1">
    </div>

    <div class="input-group">
        <label>Custom Markup (%) <span class="info-icon">?</span>
            <span class="tooltip-box">Any additional percentage you choose to add on top of our base rates (100% goes to you).</span>
        </label>
        <input type="number" id="markup" value="0.1" step="0.01">
    </div>

    <div class="results">
        <div class="result-line">
            <span>Cryptonix Profit:</span>
            <span id="cryptonixProfit">$0.00</span>
        </div>
        <div class="result-line">
            <span>Affiliate Share (<span id="sharePercent">0</span>%):</span>
            <span id="baseEarnings">$0.00</span>
        </div>
        <div class="result-line">
            <span>Markup Income:</span>
            <span id="markupEarnings">$0.00</span>
        </div>
        <div class="result-line total">
            <span>Total Monthly Commission:</span>
            <span id="totalCommission">$0.00</span>
        </div>
    </div>
</div>

<script>
    const inputs = ['volume', 'yield', 'markup'];
    
    function calculate() {
        const vol = parseFloat(document.getElementById('volume').value) || 0;
        const yld = (parseFloat(document.getElementById('yield').value) || 0) / 100;
        const mrk = (parseFloat(document.getElementById('markup').value) || 0) / 100;

        // 1. Calculate Cryptonix Profit
        const cpProfit = vol * yld;
        
        // 2. Determine Tiered Share % 
        let shareRate = 0.05;
        if (cpProfit >= 5000) shareRate = 0.20;
        else if (cpProfit >= 2500) shareRate = 0.15;
        else if (cpProfit >= 1000) shareRate = 0.10;

        // 3. Earnings Calculations [cite: 24, 30]
        const baseEarnings = cpProfit * shareRate;
        const markupEarnings = vol * mrk;
        const total = baseEarnings + markupEarnings;

        // Update UI
        document.getElementById('cryptonixProfit').innerText = '$' + cpProfit.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('sharePercent').innerText = (shareRate * 100);
        document.getElementById('baseEarnings').innerText = '$' + baseEarnings.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('markupEarnings').innerText = '$' + markupEarnings.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('totalCommission').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    // Add event listeners for dynamic updates
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', calculate);
    });

    // Initial run
    calculate();
</script>

</body>
</html>
